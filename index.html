<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Math Royale</title>
<meta name="theme-color" content="#0e0a1c">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<style>
  html,body{margin:0;height:100%;background:#0e0a1c;overflow:hidden;touch-action:none;
            font-family:"Trebuchet MS","Segoe UI",sans-serif;}
  canvas{display:block;position:absolute;inset:0;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// Go true-fullscreen on tap (hides the browser address/status bars). Runs in the
// CAPTURE phase so the game's own stopPropagation() handlers can't swallow it,
// and re-attempts on each tap until it actually takes. Skipped once installed.
(function () {
  var installed = (window.matchMedia &&
      (matchMedia('(display-mode: fullscreen)').matches ||
       matchMedia('(display-mode: standalone)').matches)) || navigator.standalone;
  if (installed) return;
  function goFull() {
    if (document.fullscreenElement || document.webkitFullscreenElement) return;
    var el = document.documentElement;
    var req = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
    if (req) { try { req.call(el); } catch (e) {} }
  }
  window.addEventListener('pointerdown', goFull, { capture: true, passive: true });
  window.addEventListener('touchstart', goFull, { capture: true, passive: true });
})();
</script>
<script type="importmap">
{"imports":{
  "three":"./vendor/three.module.js",
  "three/addons/":"./vendor/addons/"
}}
</script>
<script>
// Service worker: cache everything so the game runs with no wifi. Network-first
// for code (always fresh online), cache-first for the big stable 3D assets.
if ('serviceWorker' in navigator) {
  addEventListener('load', function () { navigator.serviceWorker.register('sw.js').catch(function () {}); });
}
</script>
<script type="module" src="src/main.js"></script>
</body>
</html>
