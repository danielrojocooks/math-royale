<canvas id="c"></canvas>
<script>
// Go true-fullscreen on the first tap (hides the browser address/status bars).
// Skipped when already launched as an installed app. One-shot; the same tap
// still reaches the game.
(function () {
  var installed = (window.matchMedia &&
      (matchMedia('(display-mode: fullscreen)').matches ||
       matchMedia('(display-mode: standalone)').matches)) || navigator.standalone;
  if (installed) return;
  function goFull() {
    window.removeEventListener('pointerdown', goFull);
    var el = document.documentElement;
    var req = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
    if (req && !document.fullscreenElement) { try { req.call(el); } catch (e) {} }
  }
  window.addEventListener('pointerdown', goFull, { passive: true });
})();
</script>
